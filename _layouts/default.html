<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "AI 大事记" }}</title>
  <link rel="icon" type="image/svg+xml" href="/daily-ai-news/favicon.svg" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; line-height: 1.7; }
    h1 { border-bottom: 2px solid #6366f1; padding-bottom: 10px; }
    a { color: #6366f1; text-decoration: none; }
    a:hover { text-decoration: underline; }
    blockquote { border-left: 4px solid #6366f1; margin: 16px 0; padding: 8px 20px; background: #f5f3ff; border-radius: 0 8px 8px 0; }
    code { background: #f0eefc; padding: 2px 6px; border-radius: 4px; font-size: 90%; }
    pre { background: #1e1b4b; color: #e0e7ff; padding: 16px; border-radius: 8px; overflow-x: auto; }
    pre code { background: none; color: inherit; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f5f3ff; }
    .footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid #eee; color: #999; font-size: 14px; text-align: center; }
  </style>
</head>
<body>
  {{ content }}
  <div class="footer">🤖 由 QClaw Agent 自动生成</div>
</body>
</html>
